name: Run Tests

on:
  workflow_call:
    inputs:
      python-versions:
        description: 'List of Python versions to use in matrix, as JSON string'
        required: true
        type: string
      os-versions:
        description: 'List of OS versions to use in matrix, as JSON string'
        required: true
        type: string
      skip-full-data-tests:
        description: 'Whether to skip tests marked full_data'
        required: false
        type: boolean
        default: false
    secrets:
      RCLONE_CONFIG:
        required: false
      CODECOV_TOKEN:
        required: true
  workflow_dispatch:
    inputs:
      python-versions:
        description: 'List of Python versions to use in matrix, as JSON string'
        required: true
        type: string
        default: '["3.10", "3.11", "3.12", "3.13"]'
      os-versions:
        description: 'List of OS versions to use in matrix, as JSON string'
        required: true
        type: string
        default: '["ubuntu-latest", "windows-2022", "macos-latest"]'
      skip-full-data-tests:
        description: 'Whether to skip tests marked full_data'
        required: false
        type: boolean
        default: false

jobs:
  run:
    name: ${{ matrix.os }} Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJson(inputs.python-versions) }}
        os: ${{ fromJson(inputs.os-versions) }}
    steps:
      - uses: actions/checkout@v5
      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install pip
        run: python -m pip install -U pip  # Official recommended way

      - name: Install GuPPy with testing requirements
        run: |
          python -m pip install "."
          python -m pip install --group test

      - name: Load stubbed data for tests
        uses: ./.github/actions/load-stubbed-data

      - name: Load full data for tests
        if: ${{ !inputs.skip-full-data-tests }}
        uses: ./.github/actions/load-full-data
        with:
          rclone-config: ${{ secrets.RCLONE_CONFIG }}

      - name: Run tests
        run: pytest tests -vv -rsx -n auto --dist worksteal -m "not parallel${{ inputs.skip-full-data-tests && ' and not full_data' || '' }}" --cov=guppy --cov-branch --cov-report=xml
      - name: Run parallel tests
        run: pytest tests -vv -rsx -m "parallel and not full_data"
      - name: Upload full coverage to Codecov
        if: ${{ matrix.python-version == '3.10' && matrix.os == 'ubuntu-latest' }}
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
